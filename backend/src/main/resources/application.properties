# =============================================================================
# CalendarioMorbido — Backend (Quarkus)
# =============================================================================
# -----------------------------------------------------------------------------
# Database
# -----------------------------------------------------------------------------
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/calendariomorbido}
# -----------------------------------------------------------------------------
# Hibernate ORM
# -----------------------------------------------------------------------------
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
# -----------------------------------------------------------------------------
# Flyway — migration automatiche all'avvio
# -----------------------------------------------------------------------------
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
quarkus.flyway.baseline-on-migrate=true
# -----------------------------------------------------------------------------
# OIDC (Keycloak)
# -----------------------------------------------------------------------------
quarkus.oidc.auth-server-url=${KEYCLOAK_URL:http://localhost:8180/realms/calendariomorbido}
quarkus.oidc.client-id=backend
quarkus.oidc.application-type=service
# -----------------------------------------------------------------------------
# CORS — permette chiamate da Next.js
# -----------------------------------------------------------------------------
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
# -----------------------------------------------------------------------------
# OpenAPI / Swagger UI
# -----------------------------------------------------------------------------
quarkus.smallrye-openapi.info-title=CalendarioMorbido API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.swagger-ui.always-include=true
# -----------------------------------------------------------------------------
# HTTP
# -----------------------------------------------------------------------------
quarkus.http.port=8080
# -----------------------------------------------------------------------------
# Dev mode overrides (%dev. prefix)
# -----------------------------------------------------------------------------
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.oidc.enabled=false
%dev.quarkus.swagger-ui.always-include=true
