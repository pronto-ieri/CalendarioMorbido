# =============================================================================
# CalendarioMorbido — Backend (Quarkus)
# =============================================================================
# -----------------------------------------------------------------------------
# Database — override via QUARKUS_DATASOURCE_JDBC_URL / QUARKUS_DATASOURCE_USERNAME / QUARKUS_DATASOURCE_PASSWORD
# -----------------------------------------------------------------------------
quarkus.datasource.db-kind=postgresql
# -----------------------------------------------------------------------------
# Hibernate ORM
# -----------------------------------------------------------------------------
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
# -----------------------------------------------------------------------------
# Flyway
# -----------------------------------------------------------------------------
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
quarkus.flyway.baseline-on-migrate=true
# -----------------------------------------------------------------------------
# OIDC (Keycloak) — disabled by default; enable via QUARKUS_OIDC_ENABLED=true when Keycloak is available
# -----------------------------------------------------------------------------
quarkus.oidc.enabled=false
quarkus.oidc.client-id=backend
quarkus.oidc.application-type=service
# -----------------------------------------------------------------------------
# CORS
# -----------------------------------------------------------------------------
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
# -----------------------------------------------------------------------------
# OpenAPI / Swagger UI
# -----------------------------------------------------------------------------
quarkus.smallrye-openapi.info-title=CalendarioMorbido API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.security-scheme=bearer
quarkus.smallrye-openapi.security-scheme-name=bearerAuth
quarkus.smallrye-openapi.security-scheme-description=JWT Bearer token (ottenuto da Keycloak)
quarkus.swagger-ui.always-include=true
# -----------------------------------------------------------------------------
# HTTP
# -----------------------------------------------------------------------------
quarkus.http.port=8080
# -----------------------------------------------------------------------------
# Dev mode overrides
# -----------------------------------------------------------------------------
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.swagger-ui.always-include=true
